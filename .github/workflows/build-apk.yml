name: Build TranslateX APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:    # allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      # Inject secrets into local.properties so they never touch source code.
      # Store these in GitHub → Settings → Secrets and variables → Actions.
      - name: Inject build config secrets
        run: |
          sed -i 's|"YOUR_GITHUB_USERNAME"|"${{ secrets.TRANSLATEX_GITHUB_OWNER }}"|g' app/build.gradle.kts
          sed -i 's|"YOUR_REPO_NAME"|"${{ secrets.TRANSLATEX_GITHUB_REPO }}"|g'        app/build.gradle.kts
          sed -i 's|"YOUR_GITHUB_PAT"|"${{ secrets.TRANSLATEX_GITHUB_TOKEN }}"|g'      app/build.gradle.kts

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TranslateX-AI-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── Optional: build Release APK (unsigned) ──────────────────────
      # Uncomment and add KEYSTORE_* secrets to also produce a signed APK.
      #
      # - name: Build Release APK
      #   run: ./gradlew assembleRelease
      #
      # - name: Upload Release APK
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: TranslateX-AI-release
      #     path: app/build/outputs/apk/release/app-release-unsigned.apk
      #     retention-days: 30
