name: TranslateX AI Backend

# Sets the workflow run's display name to include requestId so the
# Android app can identify it when polling the runs list.
run-name: "Translate [${{ github.event.inputs.request_id }}]"

on:
  workflow_dispatch:
    inputs:
      text:
        description: "Text to translate"
        required: true
      source:
        description: "Source language code (e.g. en)"
        required: true
      target:
        description: "Target language code (e.g. hi)"
        required: true
      request_id:
        description: "Unique request ID from the Android app"
        required: true
        default: "req_default"

jobs:
  translate:
    name: "translate"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install --quiet deep-translator

      - name: Run translation script
        env:
          INPUT_TEXT:  ${{ github.event.inputs.text }}
          SOURCE_LANG: ${{ github.event.inputs.source }}
          TARGET_LANG: ${{ github.event.inputs.target }}
          REQUEST_ID:  ${{ github.event.inputs.request_id }}
        run: python backend/translate.py

      # Always upload — even on script failure — so the app gets an
      # error payload rather than timing out waiting for an artifact.
      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: translation-result-${{ github.event.inputs.request_id }}
          path: result.json
          retention-days: 1
          if-no-files-found: warn
